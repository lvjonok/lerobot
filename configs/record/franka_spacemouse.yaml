# Recording config: Franka + SpaceMouse + two RealSense cameras
#
# Usage:
#   lerobot-record --config_path=configs/record/franka_spacemouse.yaml \
#     --dataset.repo_id=<user>/<dataset_name> \
#     --dataset.single_task="<task description>"
#
# Override any field via CLI:
#   lerobot-record --config_path=configs/record/franka_spacemouse.yaml \
#     --dataset.repo_id=<user>/<dataset_name> \
#     --dataset.single_task="Pick up the block" \
#     --dataset.num_episodes=10

robot:
  type: crisp_fastapi
  server_url: "http://192.168.50.67:8092"
  max_gripper_width: 0.078
  gripper_velocity: 0.15
  gripper_force: 20.0
  cameras:
    external_camera:
      type: intelrealsense
      serial_number_or_name: "838212074376"
      fps: 30
      width: 640
      height: 480
    left_wrist_camera:
      type: intelrealsense
      serial_number_or_name: "130322271369"
      fps: 30
      width: 640
      height: 480

teleop:
  type: spacemouse
  translation_scale: 0.0000125
  rotation_scale: 0.000025
  teleop_mode: "left_arm_3D_translation_Z_rotation"
  translation_deadzone: 120.0
  rotation_deadzone: 120.0

dataset:
  repo_id: "PLACEHOLDER/REPLACE_ME"
  single_task: "PLACEHOLDER: describe your task here"
  fps: 30
  num_episodes: 50
  episode_time_s: 60
  reset_time_s: 60
  video: true
  push_to_hub: false

display_data: true
